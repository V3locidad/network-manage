---
# ============================================================================
# Collecte la liste des VLANs du parc et écrit un JSON consommé par le menu
# déroulant de l'interface (assignation de port à un VLAN d'accès).
# Sortie : {{ backup_dir }}/vlans.json   (lecture seule sur les switchs)
# ============================================================================

- name: "Collecte des VLANs"
  hosts: "{{ target | default('switches') }}"
  gather_facts: false
  vars:
    target: switches
  tasks:
    - name: "Commande VLAN selon le constructeur"
      ansible.builtin.set_fact:
        vlan_cmd: "{{ 'show vlans' if switch_vendor == 'procurve' else 'show vlan brief' }}"

    - name: "Lire la liste des VLANs"
      ansible.netcommon.cli_command:
        command: "{{ vlan_cmd }}"
      register: sv
      failed_when: false
      changed_when: false
      when: switch_vendor in ['procurve', 'cisco_ios', 'cisco_nxos']

    - name: "Extraire les couples (id, nom) selon le format"
      ansible.builtin.set_fact:
        host_vlans: >-
          {{ (sv.stdout | default('') | regex_findall('(?m)^\s*(\d+)\s+(.+?)\s*\|'))
             if switch_vendor == 'procurve'
             else (sv.stdout | default('') | regex_findall('(?m)^\s*(\d+)\s+(\S+)\s+(?:active|act)')) }}
      when:
        - switch_vendor in ['procurve', 'cisco_ios', 'cisco_nxos']
        - sv.stdout is defined

- name: "Consolidation du JSON"
  hosts: localhost
  gather_facts: false
  vars:
    out: "{{ backup_dir }}/vlans.json"
  tasks:
    - name: "Construire la table id -> nom (fusion de tous les switchs)"
      ansible.builtin.set_fact:
        vlan_map: "{{ vlan_map | default({}) | combine({ item.0: (item.1 | trim) }) }}"
      loop: "{{ groups['switches']
                | map('extract', hostvars, 'host_vlans')
                | select('defined') | list | flatten(levels=1) }}"

    - name: "Écrire le JSON (liste {id, name})"
      ansible.builtin.copy:
        content: "{{ (vlan_map | default({}) | dict2items(key_name='id', value_name='name')) | to_nice_json }}"
        dest: "{{ out }}"
        mode: "0644"
