---
# ============================================================================
# Mise à jour firmware — OPÉRATION SENSIBLE (reboot).
#
# Garde-fous :
#   serial: 1           → un switch à la fois
#   firmware_check=true → SIMULATION par défaut (ne reboote rien)
#   cible explicite     → interdit de viser un groupe entier d'un coup
#
# Exemple (réel, après lab) :
#   ansible-playbook playbooks/firmware.yml \
#     -e "target=sw-acces-07 firmware_check=false \
#         firmware_image=WC_16_11_0014.swi firmware_target_version=WC.16.11.0014 \
#         firmware_tftp_server=10.0.0.50"
# ============================================================================

- name: "Mise à jour firmware (un switch à la fois)"
  # target = un nom de switch OU une liste de switchs (sélection multiple webui).
  hosts: "{{ target | default('none') }}"
  gather_facts: false
  serial: 1                       # un switch à la fois (reboot séquentiel)
  max_fail_percentage: 0

  vars:
    target: none
    firmware_check: true
    # Image par switch (sélection multi, auto par famille) : {host: fichier.swi}.
    # Si absent, on retombe sur la variable unique firmware_image.
    firmware_images_map: {}

  pre_tasks:
    # Image de CE switch : sa propre image dans la map, sinon la valeur unique.
    - name: "Choisir l'image firmware de ce switch"
      ansible.builtin.set_fact:
        firmware_image: "{{ firmware_images_map[inventory_hostname] | default(firmware_image | default('')) }}"

    - name: "Garde-fou : un switch précis + image + serveur TFTP"
      ansible.builtin.assert:
        that:
          - inventory_hostname not in ['switchs', 'procurve', 'cisco_ios', 'cisco_nxos', 'aruba_cx']
          - firmware_image | length > 0
          - firmware_tftp_server | default('') | length > 0
        fail_msg: >-
          Image firmware introuvable pour {{ inventory_hostname }} (firmware_image
          ou firmware_images_map), ou serveur TFTP manquant.

  roles:
    - role: firmware
