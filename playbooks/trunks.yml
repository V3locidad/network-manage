---
# ============================================================================
# Collecte l'état « stack » (VSF) et « trunks » (agrégation de liens) de chaque
# switch. Sortie brute par switch dans {{ backup_dir }}/trunks.json, analysée
# par l'interface (page « Trunks »). Lecture seule, sans risque.
# ============================================================================

- name: "Collecte stacking + trunks"
  hosts: "{{ target | default('procurve') }}"
  gather_facts: false

  vars:
    target: procurve

  tasks:
    # Stacking selon la famille : 3810M/5400 = « show stacking », 2930 = « show vsf ».
    - name: "Lire l'état du stack (backplane stacking)"
      ansible.netcommon.cli_command:
        command: show stacking
      register: tk_stack
      failed_when: false
      changed_when: false

    - name: "Lire l'état VSF (familles 2920/2930)"
      ansible.netcommon.cli_command:
        command: show vsf
      register: tk_vsf
      failed_when: false
      changed_when: false

    - name: "Lire les trunks (agrégation de liens)"
      ansible.netcommon.cli_command:
        command: show trunks
      register: tk_trunk
      failed_when: false
      changed_when: false

    - name: "Voisins CDP (détail : IP + port en face en une commande)"
      ansible.netcommon.cli_command:
        command: show cdp neighbors detail
      register: tk_cdp
      failed_when: false
      changed_when: false

    - name: "Ports membres des trunks"
      ansible.builtin.set_fact:
        tk_trunk_ports: >-
          {{ tk_trunk.stdout | default('')
             | regex_findall('(?m)^\s*(\d[0-9A-Za-z/]*)\s*\|.*Trk\d+') }}

    - name: "Détail LLDP de chaque port de trunk (voisin en face)"
      ansible.netcommon.cli_command:
        command: "show lldp info remote-device {{ item }}"
      loop: "{{ tk_trunk_ports | default([]) }}"
      register: tk_lldp
      failed_when: false
      changed_when: false
      when: (tk_trunk_ports | default([])) | length > 0

    - name: "Initialiser la liste LLDP"
      ansible.builtin.set_fact:
        tk_lldp_list: []

    - name: "Construire la liste port -> détail LLDP"
      ansible.builtin.set_fact:
        tk_lldp_list: >-
          {{ tk_lldp_list
             + [ {'port': item.item, 'out': item.stdout | default('')} ] }}
      loop: "{{ tk_lldp.results | default([]) }}"
      loop_control:
        label: "{{ item.item | default('') }}"
      when: tk_lldp.results is defined

    - name: "Mémoriser la sortie brute"
      ansible.builtin.set_fact:
        host_trunk_info:
          host: "{{ inventory_hostname }}"
          ip: "{{ ansible_host | default('') }}"
          stacking: "{{ tk_stack.stdout | default('') }}"
          vsf: "{{ tk_vsf.stdout | default('') }}"
          trunks: "{{ tk_trunk.stdout | default('') }}"
          cdp: "{{ tk_cdp.stdout | default('') }}"
          lldp: "{{ tk_lldp_list | default([]) }}"

- name: "Consolidation du résultat"
  hosts: localhost
  gather_facts: false
  vars:
    out: "{{ backup_dir }}/trunks.json"
  tasks:
    - name: "Rassembler par switch"
      ansible.builtin.set_fact:
        trunk_report: >-
          {{ trunk_report | default([])
             + [ hostvars[item].host_trunk_info ] }}
      loop: "{{ groups['switches'] }}"
      when: hostvars[item].host_trunk_info is defined

    - name: "Écrire le JSON"
      ansible.builtin.copy:
        content: "{{ trunk_report | default([]) | to_nice_json }}"
        dest: "{{ out }}"
        mode: "0644"
