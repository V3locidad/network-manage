---
# ============================================================================
# Collecte l'état « stack » et « trunks/agrégation » de chaque switch, MULTI-
# VENDOR (ProCurve / Cisco IOS / Aruba CX). Sortie brute par switch dans
# {{ backup_dir }}/trunks.json, analysée par l'interface (page « Trunks »).
# Lecture seule, sans risque. Les commandes inconnues d'un modèle sont ignorées
# (failed_when:false) -> pas de crash sur parc mixte.
# ============================================================================

- name: "Collecte stacking + trunks"
  hosts: "{{ target | default('switches') }}"
  gather_facts: false

  vars:
    target: switches

  tasks:
    # ===================== ProCurve / AOS-Switch =========================
    - name: "ProCurve — collecte stack/trunks/voisins"
      when: switch_vendor == 'procurve'
      block:
        - name: "ProCurve — show stacking / vsf / trunks / cdp"
          ansible.netcommon.cli_command:
            command: "{{ item }}"
          loop:
            - show stacking
            - show vsf
            - show trunks
            - show cdp neighbors detail
          register: pc_tk
          failed_when: false
          changed_when: false

        - name: "ProCurve — ports membres des trunks"
          ansible.builtin.set_fact:
            tk_trunk_ports: >-
              {{ pc_tk.results[2].stdout | default('')
                 | regex_findall('(?m)^\s*(\d[0-9A-Za-z/]*)\s*\|.*Trk\d+') }}

        - name: "ProCurve — LLDP détaillé des ports de trunk"
          ansible.netcommon.cli_command:
            command: "show lldp info remote-device {{ item }}"
          loop: "{{ tk_trunk_ports | default([]) }}"
          register: pc_lldp
          failed_when: false
          changed_when: false
          when: (tk_trunk_ports | default([])) | length > 0

        - name: "ProCurve — liste port -> détail LLDP"
          ansible.builtin.set_fact:
            tk_lldp_list: "{{ tk_lldp_list | default([]) + [ {'port': item.item, 'out': item.stdout | default('')} ] }}"
          loop: "{{ pc_lldp.results | default([]) }}"
          loop_control:
            label: "{{ item.item | default('') }}"
          when: pc_lldp.results is defined

        - name: "ProCurve — champs unifiés"
          ansible.builtin.set_fact:
            tk_stacking: "{{ pc_tk.results[0].stdout | default('') }}"
            tk_vsf: "{{ pc_tk.results[1].stdout | default('') }}"
            tk_trunks: "{{ pc_tk.results[2].stdout | default('') }}"
            tk_cdp: "{{ pc_tk.results[3].stdout | default('') }}"
            tk_lldp_raw: ""

    # ===================== Cisco IOS =====================================
    - name: "Cisco — collecte stack/etherchannel/voisins"
      when: switch_vendor == 'cisco_ios'
      block:
        - name: "Cisco — show switch / etherchannel / cdp / lldp"
          ansible.netcommon.cli_command:
            command: "{{ item }}"
          loop:
            - show switch
            - show etherchannel summary
            - show cdp neighbors detail
            - show lldp neighbors detail
          register: ci_tk
          failed_when: false
          changed_when: false

        - name: "Cisco — champs unifiés"
          ansible.builtin.set_fact:
            tk_stacking: "{{ ci_tk.results[0].stdout | default('') }}"
            tk_vsf: ""
            tk_trunks: "{{ ci_tk.results[1].stdout | default('') }}"
            tk_cdp: "{{ ci_tk.results[2].stdout | default('') }}"
            tk_lldp_raw: "{{ ci_tk.results[3].stdout | default('') }}"
            tk_lldp_list: []

    # ===================== Aruba CX ======================================
    - name: "Aruba CX — collecte vsf/lag/voisins"
      when: switch_vendor == 'aruba_cx'
      block:
        - name: "Aruba CX — show vsf / lag / lldp neighbor-info"
          ansible.netcommon.cli_command:
            command: "{{ item }}"
          loop:
            - show vsf
            - show lag
            - show lldp neighbor-info
          register: cx_tk
          failed_when: false
          changed_when: false

        - name: "Aruba CX — champs unifiés"
          ansible.builtin.set_fact:
            tk_stacking: ""
            tk_vsf: "{{ cx_tk.results[0].stdout | default('') }}"
            tk_trunks: "{{ cx_tk.results[1].stdout | default('') }}"
            tk_cdp: ""
            tk_lldp_raw: "{{ cx_tk.results[2].stdout | default('') }}"
            tk_lldp_list: []

    # ===================== Enregistrement unifié =========================
    - name: "Mémoriser la sortie brute"
      ansible.builtin.set_fact:
        host_trunk_info:
          host: "{{ inventory_hostname }}"
          ip: "{{ ansible_host | default('') }}"
          vendor: "{{ switch_vendor | default('') }}"
          stacking: "{{ tk_stacking | default('') }}"
          vsf: "{{ tk_vsf | default('') }}"
          trunks: "{{ tk_trunks | default('') }}"
          cdp: "{{ tk_cdp | default('') }}"
          lldp_raw: "{{ tk_lldp_raw | default('') }}"
          lldp: "{{ tk_lldp_list | default([]) }}"
      when: tk_stacking is defined or tk_vsf is defined or tk_trunks is defined

- name: "Consolidation du résultat"
  hosts: localhost
  gather_facts: false
  vars:
    out: "{{ backup_dir }}/trunks.json"
  tasks:
    - name: "Rassembler par switch"
      ansible.builtin.set_fact:
        trunk_report: "{{ trunk_report | default([]) + [ hostvars[item].host_trunk_info ] }}"
      loop: "{{ groups['switches'] }}"
      when: hostvars[item].host_trunk_info is defined

    - name: "Écrire le JSON"
      ansible.builtin.copy:
        content: "{{ trunk_report | default([]) | to_nice_json }}"
        dest: "{{ out }}"
        mode: "0644"
