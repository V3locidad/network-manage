---
# ============================================================================
# Restaure une sauvegarde de configuration sur UN switch (multi-vendor).
#   - Charge backups/<host>/<fichier>.cfg en startup-config (via TFTP).
#   - Recharge le switch pour appliquer (⚠️ REBOOT, coupure ~2-3 min).
#
# ⚠️ UN SEUL switch à la fois. restore_dry_run=true par défaut (simulation).
#   Le serveur TFTP sert /opt/net-automation/backups sous « backups/ ».
#   Cisco : nécessite le mode privilégié (la webui envoie cisco_become=true).
# ============================================================================

- name: "Restauration de configuration"
  hosts: "{{ target | default('') }}"
  gather_facts: false
  serial: 1

  vars:
    target: ""
    restore_file: ""
    restore_dry_run: true
    restore_tftp_server: ""

  tasks:
    - name: "Garde-fou : fichier + serveur TFTP requis"
      ansible.builtin.assert:
        that:
          - restore_file | length > 0
          - restore_tftp_server | length > 0
        fail_msg: "Fichier de sauvegarde ou serveur TFTP manquant."
        quiet: true

    - name: "Chemin TFTP de la sauvegarde"
      ansible.builtin.set_fact:
        _tftp_path: "backups/{{ inventory_hostname }}/{{ restore_file }}"

    # ---- SIMULATION -------------------------------------------------------
    - name: "SIMULATION — ce qui serait fait (rien n'est touché)"
      ansible.builtin.debug:
        msg: >-
          [DRY-RUN] {{ inventory_hostname }} ({{ switch_vendor }}) — chargerait
          « {{ _tftp_path }} » en startup-config depuis tftp://{{ restore_tftp_server }},
          PUIS REDÉMARRERAIT le switch (coupure ~2-3 min). Décoche la simulation
          pour appliquer.
      when: restore_dry_run | bool

    # ---- Aruba CX : non géré (restauration TFTP CLI à valider) ------------
    - name: "Aruba CX — restauration non implémentée"
      ansible.builtin.fail:
        msg: >-
          Restauration TFTP non implémentée pour Aruba CX. À faire en CLI
          manuelle (copy tftp://… startup-config vrf … puis boot).
      when:
        - not (restore_dry_run | bool)
        - switch_vendor == 'aruba_cx'

    # ---- ProCurve / AOS-Switch -------------------------------------------
    # copy tftp startup-config peut demander une confirmation (« Continue
    # (y/n)? »). On répond « y ». On CAPTURE la sortie pour détecter un échec
    # TFTP (sinon Ansible afficherait « ok » alors que rien n'a été transféré).
    - name: "ProCurve — charger en startup-config (TFTP)"
      ansible.netcommon.cli_command:
        command: "copy tftp startup-config {{ restore_tftp_server }} {{ _tftp_path }}"
        prompt:
          - "(?i)continue|\\[y/n\\]|y/n|press any key"
        answer:
          - "y"
        check_all: true
      vars:
        ansible_command_timeout: 180
      register: pc_copy
      failed_when: false
      when:
        - not (restore_dry_run | bool)
        - switch_vendor == 'procurve'

    - name: "ProCurve — sortie de la copie TFTP (diagnostic)"
      ansible.builtin.debug:
        msg: "{{ pc_copy.stdout | default('(pas de sortie)') }}"
      when:
        - not (restore_dry_run | bool)
        - switch_vendor == 'procurve'

    - name: "ProCurve — vérifier que la copie TFTP a réussi"
      ansible.builtin.assert:
        that:
          - pc_copy.stdout is defined
          - not (pc_copy.stdout | regex_search('(?i)unable|fail|denied|timed?\s*out|not found|no such|invalid|error|exceeded'))
        fail_msg: >-
          La copie TFTP a échoué — le switch n'a PAS reçu la config. Sortie :
          « {{ pc_copy.stdout | default('') }} ». Vérifie que le switch atteint
          {{ restore_tftp_server }} (UDP/69) et que « {{ _tftp_path }} » existe.
        success_msg: "Copie TFTP acceptée par le switch."
      when:
        - not (restore_dry_run | bool)
        - switch_vendor == 'procurve'

    # On répond « n » à « save current configuration » (NE PAS écraser la
    # startup-config qu'on vient de restaurer), puis « y » pour rebooter.
    - name: "ProCurve — recharger (applique la startup-config)"
      ansible.netcommon.cli_command:
        command: reload
        prompt:
          - "(?i)save current configuration"
          - "(?i)continue|reboot"
        answer:
          - "n"
          - "y"
        check_all: true
      vars:
        ansible_command_timeout: 120
      register: pc_reload
      failed_when: false
      when:
        - not (restore_dry_run | bool)
        - switch_vendor == 'procurve'

    - name: "ProCurve — sortie du reload (diagnostic)"
      ansible.builtin.debug:
        msg: "{{ pc_reload.stdout | default('(reboot — session coupée, normal)') }}"
      when:
        - not (restore_dry_run | bool)
        - switch_vendor == 'procurve'

    # ---- Cisco IOS / NX-OS ------------------------------------------------
    - name: "Cisco — charger en startup-config (TFTP)"
      ansible.netcommon.cli_command:
        command: "copy tftp://{{ restore_tftp_server }}/{{ _tftp_path }} startup-config"
        prompt:
          - "Destination filename"
        answer:
          - "startup-config"
        check_all: true
      vars:
        ansible_command_timeout: 120
      when:
        - not (restore_dry_run | bool)
        - switch_vendor in ['cisco_ios', 'cisco_nxos']

    - name: "Cisco — recharger (applique la startup-config)"
      ansible.netcommon.cli_command:
        command: reload
        prompt:
          - "yes/no"
          - "confirm"
        answer:
          - "no"
          - "y"
        check_all: true
      vars:
        ansible_command_timeout: 120
      failed_when: false
      when:
        - not (restore_dry_run | bool)
        - switch_vendor in ['cisco_ios', 'cisco_nxos']

    # ---- Attente du retour (tous les vendors gérés) ----------------------
    - name: "Attendre le retour du switch (SSH)"
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        delay: 60
        timeout: 600
      delegate_to: localhost
      when:
        - not (restore_dry_run | bool)
        - switch_vendor in ['procurve', 'cisco_ios', 'cisco_nxos']

    - name: "Restauration terminée"
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} redémarré sur la config restaurée ({{ restore_file }})."
      when:
        - not (restore_dry_run | bool)
        - switch_vendor in ['procurve', 'cisco_ios', 'cisco_nxos']
