---
# ============================================================================
# Sauvegarde la running-config de tout le parc.
# Idéal à planifier (cron) une fois par jour.
#
#   ansible-playbook playbooks/backup_config.yml --ask-vault-pass
# ============================================================================

- name: "Sauvegarde des configurations"
  hosts: "{{ target | default('switchs') }}"
  gather_facts: false

  vars:
    target: switchs

  roles:
    - role: backup
