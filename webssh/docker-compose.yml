---
# Terminal SSH dans le navigateur (xterm). Page web où l'on se connecte à un
# switch (IP + identifiants) et où l'on obtient une vraie session interactive.
# Démarrage :  cd webssh && docker compose up -d --build
# Accès :      http://<ip-lxc>:8888
services:
  webssh:
    build:
      context: .
      dockerfile: Dockerfile
      # En LXC, le bridge de build n'a pas toujours de route sortante -> on
      # build avec le réseau de l'hôte (qui, lui, fonctionne).
      network: host
    image: net-automation/webssh:latest
    container_name: webssh
    restart: unless-stopped
    # --timeout=30 : les vieux serveurs SSH (group-exchange lent) dépassent le
    # défaut de 3 s -> « No existing session ». 30 s laisse le handshake finir.
    command: ["wssh", "--address=0.0.0.0", "--port=8888", "--timeout=30"]
    # Plus de port publié : accessible UNIQUEMENT via Caddy (TLS + auth).
    expose:
      - "8888"
    networks:
      - netauto

networks:
  netauto:
    external: true
