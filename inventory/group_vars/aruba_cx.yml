---
# Connexion pour les switchs Aruba CX en SSH/CLI (network_cli).
# Évite la dépendance REST 'pyaoscx' et unifie les identifiants : mêmes que le
# reste du parc via secret/switch_creds.yml (-e @...).
ansible_connection: ansible.netcommon.network_cli
ansible_network_os: arubanetworks.aoscx.aoscx
ansible_user: "{{ vault_aruba_cx_user | default(omit) }}"
ansible_password: "{{ vault_aruba_cx_pass | default(omit) }}"

switch_vendor: aruba_cx
