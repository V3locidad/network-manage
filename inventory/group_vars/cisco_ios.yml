---
# Connexion pour les switchs Cisco IOS / IOS-XE.
# Identifiants : fournis par l'interface via secret/switch_creds.yml (-e @...),
# injectés comme ansible_user / ansible_password (priorité sur ce fichier).
ansible_connection: ansible.netcommon.network_cli
ansible_network_os: cisco.ios.ios
ansible_user: "{{ vault_cisco_user | default(omit) }}"
ansible_password: "{{ vault_cisco_pass | default(omit) }}"

# Passage en mode privilégié (enable). DÉSACTIVÉ par défaut : les commandes de
# LECTURE (facts, show…) marchent au niveau user -> état firmware / rapports /
# backup fonctionnent sans enable. Pour la CONFIG (port/VLAN) qui exige le mode
# privilégié, lance avec -e cisco_become=true.
ansible_become: "{{ cisco_become | default(false) }}"
ansible_become_method: enable
# Mot de passe enable : cisco_enable_password (secret/switch_creds.yml) en
# priorité, sinon le mot de passe de connexion. Si pas d'enable, -e cisco_become=false.
ansible_become_password: >-
  {{ cisco_enable_password
     | default(vault_cisco_enable | default(ansible_password | default(omit))) }}

# Type d'interface préfixé automatiquement quand on ne saisit qu'un numéro
# (ex: "0/45" -> "GigabitEthernet0/45"). Surcharge par site si besoin :
# TenGigabitEthernet, FastEthernet, etc. Saisir un nom complet (Gi0/45) reste OK.
cisco_interface_prefix: "GigabitEthernet"

# Identifiant de "vendor" utilisé par les rôles pour l'aiguillage.
switch_vendor: cisco_ios
