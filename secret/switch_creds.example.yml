# MODÈLE — identifiants de connexion aux switchs pour l'interface web maison.
#
# Sur le LXC, crée le vrai fichier (hors dépôt Git) :
#   mkdir -p /opt/net-automation/secret
#   cp secret/switch_creds.example.yml /opt/net-automation/secret/switch_creds.yml
#   nano /opt/net-automation/secret/switch_creds.yml      # mets les vrais id
#   chmod 600 /opt/net-automation/secret/switch_creds.yml
#
# Ces variables surchargent l'inventaire au lancement (-e @...).
ansible_user: manager
ansible_password: CHANGE_ME
