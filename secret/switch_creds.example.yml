---
# MODÈLE — identifiants de connexion aux switchs pour l'interface web maison.
#
# Sur le LXC, crée le vrai fichier (hors dépôt Git) :
#   mkdir -p /opt/net-automation/secret
#   cp secret/switch_creds.example.yml /opt/net-automation/secret/switch_creds.yml
#   nano /opt/net-automation/secret/switch_creds.yml      # mets les vrais id
#   chmod 600 /opt/net-automation/secret/switch_creds.yml
#
# Ces variables surchargent l'inventaire au lancement (-e @...).

# --- Compte commun (tout le parc) -------------------------------------------
ansible_user: manager
ansible_password: CHANGE_ME

# --- Cisco : mot de passe « enable » (config VLAN/port) ---------------------
# Nécessaire pour CONFIGURER des Cisco. Vide/absent = la lecture marche quand
# même ; si l'enable = ansible_password, tu peux l'omettre.
# cisco_enable_password: CHANGE_ME

# --- Identifiants PAR CONSTRUCTEUR (optionnel) ------------------------------
# Seulement si un type de switch a un compte DIFFÉRENT du compte commun.
# vault_cisco_user: ""          # Cisco IOS / NX-OS
# vault_cisco_pass: ""
# vault_aruba_cx_user: ""        # Aruba CX (SSH)
# vault_aruba_cx_pass: ""
# (ProCurve / Aruba OS-Switch utilisent le compte commun.)
