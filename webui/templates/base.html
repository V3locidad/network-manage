<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestion des switchs</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           margin: 0; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 16px 24px; display: flex;
             align-items: center; justify-content: space-between;
             border-bottom: 1px solid #334155; }
    header h1 { font-size: 18px; margin: 0; }
    header a { color: #94a3b8; text-decoration: none; font-size: 14px; }
    main { max-width: 880px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
            gap: 16px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 20px; }
    .card h2 { margin: 0 0 6px; font-size: 16px; }
    .card p { color: #94a3b8; font-size: 13px; margin: 0 0 14px; }
    label { display: block; font-size: 13px; margin: 10px 0 4px; color: #cbd5e1; }
    input, select { width: 100%; padding: 8px 10px; border-radius: 8px;
                    border: 1px solid #475569; background: #0f172a; color: #e2e8f0; }
    button { margin-top: 14px; width: 100%; padding: 10px; border: 0;
             border-radius: 8px; background: #2563eb; color: #fff; font-weight: 600;
             cursor: pointer; font-size: 14px; }
    button:hover { background: #1d4ed8; }
    .icon { font-size: 22px; }
    pre { background: #020617; border: 1px solid #334155; border-radius: 10px;
          padding: 16px; overflow: auto; font-size: 12.5px; line-height: 1.5;
          white-space: pre-wrap; min-height: 320px; max-height: 70vh; }
    .check { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .check input { width: auto; }
    .warn { color: #fbbf24; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Gestion des switchs</h1>
    {% if session.get('auth') %}
      <nav style="display:flex;gap:18px;align-items:center;">
        <a href="{{ url_for('index') }}">Actions</a>
        <a href="{{ url_for('console_result') }}">Console</a>
        <a href="{{ url_for('terminal') }}">Terminal</a>
        <a href="{{ url_for('audit_dashboard') }}">Conformité</a>
        <a href="{{ url_for('firmware_dashboard') }}">État firmware</a>
        <a href="{{ url_for('logout') }}">Déconnexion</a>
      </nav>
    {% endif %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
