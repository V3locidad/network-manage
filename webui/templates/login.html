{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:360px;margin:60px auto;">
  <h2>Connexion</h2>
  <p>Accès à l'interface de gestion des switchs.</p>
  {% if error %}<p class="warn">{{ error }}</p>{% endif %}
  <form method="post">
    {% if accounts %}
      <label>Identifiant</label>
      <input type="text" name="who" placeholder="votre identifiant" autofocus required>
      <label>Mot de passe</label>
      <input type="password" name="password" required>
    {% else %}
      <label>Votre nom <span class="muted">(pour l'historique, non vérifié)</span></label>
      <input type="text" name="who" placeholder="ex : Julien" autofocus>
      <label>Mot de passe</label>
      <input type="password" name="password" required>
    {% endif %}
    <button type="submit">Se connecter</button>
  </form>
</div>
{% endblock %}
