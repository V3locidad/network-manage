[defaults]
inventory            = inventory/hosts.yml
roles_path           = roles
host_key_checking    = False
retry_files_enabled  = False
# Affichage lisible : callback intégré + format YAML (l'ancien callback
# community.general.yaml a été retiré d'ansible-core récent).
stdout_callback      = ansible.builtin.default
result_format        = yaml
deprecation_warnings = False
interpreter_python   = auto_silent

# Garde les logs d'exécution (utile quand l'interface lance les playbooks)
log_path             = ./ansible.log

[persistent_connection]
connect_timeout      = 60
command_timeout      = 60

[paramiko_connection]
look_for_keys        = False
