---
# Rôle baseline — applique la config standard + sécurité des ports d'accès.

- name: "Validation des paramètres (en mode réel)"
  ansible.builtin.assert:
    # On ne valide QUE les blocs activés (interrupteurs de la page Config standard).
    that:
      - (not (baseline_ntp | bool)) or (ntp_server | length > 0)
      - (not (baseline_logging | bool)) or (logging_server | length > 0)
      - (not (baseline_authmgr | bool)) or (authorized_manager | length > 0)
      - >-
        (not (baseline_snmp | bool))
        or ((snmp_communities | default([]) | length > 0)
            or (snmp_remove_communities | default([]) | length > 0)
            or (snmp_contact | length > 0))
    fail_msg: >-
      Un bloc activé manque de paramètre : vérifie NTP / logging / SNMP /
      authorized-managers dans la page « Config standard » (ou décoche le bloc).
    quiet: true
  when: not (baseline_dry_run | bool)

- name: "Implémentation disponible pour {{ switch_vendor }} ?"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ switch_vendor }}.yml"
  register: _vendor_impl
  delegate_to: localhost

- name: "Aiguillage vers l'implémentation {{ switch_vendor }}"
  ansible.builtin.include_tasks: "{{ switch_vendor }}.yml"
  when: _vendor_impl.stat.exists

- name: "Action non implémentée pour {{ switch_vendor }} — ignoré"
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} : pas d'implémentation « {{ switch_vendor }} »
      pour cette action — ignoré (sans erreur).
  when: not _vendor_impl.stat.exists
