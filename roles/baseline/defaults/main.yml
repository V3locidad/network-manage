---
# Config standard du site (role baseline). Valeurs réelles dans le fichier
# LOCAL inventory/group_vars/all/site.yml (git-ignoré). Ici : valeurs vides.
ntp_server: ""
logging_server: ""
snmp_community: ""            # rétro-compat : communauté unique
# Plusieurs communautés : à configurer [{name, access}] / à retirer [noms].
snmp_communities: []
snmp_remove_communities: []
snmp_contact: ""
snmp_location: ""
# ⚠️ Le masque doit COUVRIR le réseau de management (sinon lockout du serveur !)
authorized_manager: ""        # ex: "10.0.0.0 255.255.255.0"
# VLAN dont les ports d'accès (untagged) reçoivent la sécurité STP/loop-protect.
protected_vlans: []
# Délai (s) de réactivation auto d'un port coupé par loop-protect. 0 = jamais
# (réactivation manuelle obligatoire).
loop_protect_disable_timer: 300

baseline_dry_run: true        # simulation par défaut
baseline_save: true           # write memory après application

# Interrupteurs (appliquer ou non chaque bloc) — pilotés par la page « Config
# standard » de l'interface. Par défaut tout est appliqué (comportement inchangé).
# Bannière MOTD — propre au site (jamais versionnée).
banner_motd: ""
baseline_ntp: true
baseline_logging: true
baseline_snmp: true
baseline_web_mgmt_off: true
baseline_authmgr: true
baseline_banner: true
baseline_spanning_tree: true
baseline_loop_protect: true
