---
# ============================================================================
# Rôle facts_report — collecte modèle / version / n° de série de chaque switch
# et produit une ligne CSV (fact_line) consolidée par le playbook.
# Lecture seule.
# ============================================================================

# ---- Cisco IOS --------------------------------------------------------------
- name: "Collecte des facts (Cisco IOS)"
  cisco.ios.ios_facts:
    gather_subset: ["hardware", "default"]
  when: switch_vendor == 'cisco_ios'

# ---- Cisco NX-OS ------------------------------------------------------------
- name: "Collecte des facts (Cisco NX-OS)"
  cisco.nxos.nxos_facts:
    gather_subset: ["hardware", "default"]
  when: switch_vendor == 'cisco_nxos'

# ---- Aruba CX (SSH/CLI) -----------------------------------------------------
- name: "Aruba CX — show version / show system (SSH)"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - show version
    - show system
  register: cx_show
  failed_when: false
  changed_when: false
  when: switch_vendor == 'aruba_cx'

- name: "Aruba CX — extraire version / modèle / série"
  ansible.builtin.set_fact:
    _cx_ver_out: "{{ cx_show.results[0].stdout | default('') }}"
    _cx_sys_out: "{{ cx_show.results[1].stdout | default('') }}"
  when: switch_vendor == 'aruba_cx'

- name: "Aruba CX — facts"
  ansible.builtin.set_fact:
    ansible_net_version: "{{ (_cx_ver_out | regex_search('(?i)Version\\s*:\\s*(\\S+)', '\\1') | default(['?'], true)) | first }}"
    ansible_net_model: "{{ (_cx_sys_out | regex_search('(?i)Product Name\\s*:\\s*(.+)', '\\1') | default(['?'], true)) | first | trim }}"
    ansible_net_serialnum: "{{ (_cx_sys_out | regex_search('(?i)(?:Serial Number|Chassis Serial Nbr)\\s*:\\s*(\\S+)', '\\1') | default(['?'], true)) | first }}"
    # MAC de base (format xx:xx:xx:xx:xx:xx dans 'show system').
    ansible_net_basemac: "{{ (_cx_sys_out | regex_search('(?i)Base MAC Add?ress\\s*:\\s*([0-9a-fA-F:.-]+)', '\\1') | default([''], true)) | first }}"
  when: switch_vendor == 'aruba_cx'

# ---- Aruba 2930F / AOS-Switch (SSH/CLI) -------------------------------------
- name: "ProCurve/AOS-Switch — collecte via CLI"
  when: switch_vendor == 'procurve'
  block:
    - name: "Récupérer 'show system'"
      ansible.netcommon.cli_command:
        command: show system
      register: pc_system
      failed_when: false
      changed_when: false

    - name: "Récupérer 'show modules' (absent sur certains modèles fixes)"
      ansible.netcommon.cli_command:
        command: show modules
      register: pc_modules
      failed_when: false
      changed_when: false

    - name: "Texte combiné modules + system"
      ansible.builtin.set_fact:
        _pc_desc: "{{ (pc_modules.stdout | default('')) ~ ' ' ~ (pc_system.stdout | default('')) }}"

    - name: "Extraire version / série / modèle (tolérant)"
      ansible.builtin.set_fact:
        ansible_net_version: >-
          {{ (pc_system.stdout | default('') | regex_search('Software revision\s*:\s*(\S+)', '\1')
              | default(['?'], true)) | first }}
        ansible_net_serialnum: >-
          {{ (pc_system.stdout | default('') | regex_search('Serial Number\s*:\s*(\S+)', '\1')
              | default(['?'], true)) | first }}
        # MAC de base (format HP xxxxxx-xxxxxx dans 'show system').
        ansible_net_basemac: >-
          {{ (pc_system.stdout | default('') | regex_search('Base MAC Addr\s*:\s*([0-9a-fA-F:.-]+)', '\1')
              | default([''], true)) | first }}
        # Modèle lisible (2930F, 3810M…) ; repli sur le SKU JLxxxx, sinon ?.
        ansible_net_model: >-
          {{ (_pc_desc | regex_search('2930F|2930M|3810M|2920|2540|2530|2510|2960X|2960S|5400R|6300|6200|6100|8320|8325|8360|6400'))
             | default((_pc_desc | regex_search('J[A-Z0-9]{4,}')) | default('?', true), true) }}

    # Certains modèles (ex. 2620) n'affichent le modèle nulle part dans
    # 'show system' et ne supportent pas 'show modules'. On le déduit alors du
    # préfixe de la version logicielle (RA=2620, WC=2930F, KB=3810M…).
    - name: "ProCurve — repli modèle via la famille logicielle si inconnu"
      ansible.builtin.set_fact:
        ansible_net_model: >-
          {{ {'WC': '2930F', 'WL': '2930M', 'WB': '2920', 'YC': '2540',
              'YA': '2530', 'YB': '2530', 'RA': '2620', 'KA': '3800',
              'KB': '3810M'}.get(
              (ansible_net_version | default('') | regex_search('^([A-Za-z]+)', '\1')
               | default([''], true) | first | upper), '?') }}
      when: (ansible_net_model | default('?')) in ['?', '']

# ---- Ligne CSV commune ------------------------------------------------------
- name: "Construire la ligne de rapport (CSV)"
  ansible.builtin.set_fact:
    fact_line: >-
      {{ inventory_hostname }},{{ switch_vendor }},{{ ansible_host }},{{
        ansible_net_model | default(ansible_net_platform | default('?')) }},{{
        ansible_net_version | default('?') }},{{
        ansible_net_serialnum | default('?') }}
