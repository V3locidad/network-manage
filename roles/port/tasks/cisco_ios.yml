---
# Activation/désactivation de port — Cisco IOS / IOS-XE (cli_command).
# - Détecte le nom COMPLET de l'interface (Gi/Te/Fa) via 'show ip interface brief'
#   à partir du numéro saisi (ex: 0/45) -> on tape juste le numéro.
# - Protection rocade : liste manuelle uplink_ports OU voisin CDP « Switch ».

- name: "Cisco — lister les interfaces"
  ansible.netcommon.cli_command:
    command: show ip interface brief
  register: cisco_ifb
  failed_when: false
  changed_when: false

- name: "Cisco — résoudre le nom complet de l'interface"
  ansible.builtin.set_fact:
    cisco_if: >-
      {{ (cisco_ifb.stdout | default('')
          | regex_findall('(?m)^(\S+)')
          | select('search', '(?:^|[^0-9])' ~ (port_id | regex_escape) ~ '$')
          | list | first)
         | default((cisco_interface_prefix ~ port_id), true) }}

# ---- Protection rocade (avant toute désactivation) ------------------------
- name: "Cisco — voisin CDP du port {{ cisco_if }}"
  ansible.netcommon.cli_command:
    command: "show cdp neighbors {{ cisco_if }} detail"
  register: cisco_cdp
  failed_when: false
  changed_when: false
  when: port_state == 'disable'

- name: "Cisco — INTERDIT : désactivation d'une rocade"
  ansible.builtin.fail:
    msg: >-
      ⛔ Le port {{ cisco_if }} de {{ inventory_hostname }} est une ROCADE
      (voisin switch détecté en CDP, ou listé en uplink_ports). Désactivation
      refusée pour ne pas couper le réseau.
  when:
    - port_state == 'disable'
    - >-
      ((port_id | string) in (uplink_ports | default([]) | map('string') | list))
      or (cisco_cdp.stdout | default('') is search('(?i)Capabilities:.*\bSwitch\b'))

# ---- Application ----------------------------------------------------------
- name: "Cisco — {{ 'désactiver' if port_state == 'disable' else 'activer' }} {{ cisco_if }}"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - configure terminal
    - "interface {{ cisco_if }}"
    - "{{ 'shutdown' if port_state == 'disable' else 'no shutdown' }}"
    - end
  register: port_apply
  when: not (port_dry_run | bool)

- name: "Cisco — sauvegarde (write memory)"
  ansible.netcommon.cli_command:
    command: write memory
  when:
    - port_save_config | bool
    - not (port_dry_run | bool)

- name: "Cisco — SIMULATION"
  ansible.builtin.debug:
    msg: >-
      [DRY-RUN] {{ inventory_hostname }} (Cisco) : interface {{ cisco_if }}
      serait « {{ port_state }} ». Rien n'a été écrit.
  when: port_dry_run | bool
