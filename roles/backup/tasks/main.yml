---
# ============================================================================
# Rôle backup — récupère la running-config de chaque switch et l'archive
# dans files/backups/<hostname>/<hostname>_<timestamp>.cfg
# Lecture seule : aucun risque, idéal pour valider la connectivité du parc.
# ============================================================================

- name: "Préparer le répertoire de sauvegarde pour {{ inventory_hostname }}"
  ansible.builtin.file:
    path: "{{ backup_dir }}/{{ inventory_hostname }}"
    state: directory
    # 0755 : le serveur TFTP (utilisateur 'tftp') doit pouvoir traverser le
    # dossier pour servir les .cfg lors d'une restauration.
    mode: "0755"
  delegate_to: localhost

- name: "Horodatage de la sauvegarde"
  ansible.builtin.set_fact:
    backup_ts: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"

# --- Récupération de la config (CLI/SSH, tous constructeurs) ------------------
# Tout le parc est en network_cli (SSH), Aruba CX inclus.
- name: "Récupérer la running-config (CLI/SSH)"
  ansible.netcommon.cli_command:
    command: "show running-config"
  register: cfg_cli

# AOS-Switch : « show running-config » préfixe la sortie par « Running
# configuration: » + ligne vide. Ce préfixe rend le fichier INVALIDE pour
# « copy tftp startup-config » (le switch répond « Wrong file »). On retire tout
# ce qui précède la ligne « ; … Configuration Editor; ». Cisco/Aruba CX : inchangé.
- name: "Normaliser la sortie de config (retirer l'en-tête AOS-Switch)"
  ansible.builtin.set_fact:
    running_config: >-
      {{ cfg_cli.stdout | regex_replace('(?s)^.*?(;[^\\n]*Configuration Editor;)', '\\1')
         if switch_vendor == 'procurve' else cfg_cli.stdout }}

- name: "Écrire la sauvegarde sur le contrôleur"
  ansible.builtin.copy:
    content: "{{ running_config }}\n"
    dest: "{{ backup_dir }}/{{ inventory_hostname }}/{{ inventory_hostname }}_{{ backup_ts }}.cfg"
    # 0644 : lisible par l'utilisateur 'tftp' du conteneur TFTP (restauration).
    mode: "0644"
  delegate_to: localhost

- name: "Sauvegarde terminée"
  ansible.builtin.debug:
    msg: "Config de {{ inventory_hostname }} sauvegardée → {{ inventory_hostname }}_{{ backup_ts }}.cfg"
