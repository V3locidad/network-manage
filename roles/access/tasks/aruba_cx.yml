---
# Place un port en accès dans un VLAN — Aruba CX en SSH/CLI (cli_command).

- name: "Aruba CX — port {{ access_port_id }} en accès VLAN {{ access_vlan_id }}"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - configure terminal
    - "interface {{ access_port_id }}"
    - no routing
    - "vlan access {{ access_vlan_id | int }}"
    - exit
    - end
  register: access_apply
  when: not (access_dry_run | bool)

- name: "Aruba CX — sauvegarde (write memory)"
  ansible.netcommon.cli_command:
    command: write memory
  when:
    - access_save | bool
    - not (access_dry_run | bool)

- name: "Aruba CX — SIMULATION"
  ansible.builtin.debug:
    msg: >-
      [DRY-RUN] {{ inventory_hostname }} (Aruba CX) : port {{ access_port_id }}
      passerait en accès VLAN {{ access_vlan_id }}. Rien n'a été écrit.
  when: access_dry_run | bool
