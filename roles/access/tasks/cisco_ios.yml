---
# Place un port en accès dans un VLAN — Cisco IOS / IOS-XE (cli_command).

# Nom complet de l'interface détecté via 'show ip interface brief' (Gi/Te/Fa),
# à partir du numéro saisi ; repli sur le préfixe par défaut si introuvable.
- name: "Cisco — lister les interfaces"
  ansible.netcommon.cli_command:
    command: show ip interface brief
  register: cisco_ifb
  failed_when: false
  changed_when: false

- name: "Cisco — résoudre le nom complet de l'interface"
  ansible.builtin.set_fact:
    cisco_if: >-
      {{ (cisco_ifb.stdout | default('')
          | regex_findall('(?m)^(\S+)')
          | select('search', '(?:^|[^0-9])' ~ (access_port_id | regex_escape) ~ '$')
          | list | first)
         | default((cisco_interface_prefix ~ access_port_id), true) }}

- name: "Cisco — {{ cisco_if }} en accès VLAN {{ access_vlan_id }}"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - configure terminal
    - "interface {{ cisco_if }}"
    - switchport mode access
    - "switchport access vlan {{ access_vlan_id | int }}"
    - end
  register: access_apply
  when: not (access_dry_run | bool)

- name: "Cisco — sauvegarde (write memory)"
  ansible.netcommon.cli_command:
    command: write memory
  when:
    - access_save | bool
    - not (access_dry_run | bool)

- name: "Cisco — SIMULATION"
  ansible.builtin.debug:
    msg: >-
      [DRY-RUN] {{ inventory_hostname }} (Cisco) : port {{ access_port_id }}
      passerait en accès VLAN {{ access_vlan_id }}. Rien n'a été écrit.
  when: access_dry_run | bool
