---
# Assignation d'un port à un VLAN d'accès — Aruba 2930F / AOS-Switch en SSH.
# Sur AOS-Switch : « vlan <id> untagged <port> » déplace le port dans ce VLAN
# (il quitte automatiquement son VLAN untagged précédent).

# ---- PROTECTION ROCADE : on n'assigne pas un uplink en accès ---------------
- name: "Lire le voisin LLDP du port {{ access_port_id }}"
  ansible.netcommon.cli_command:
    command: "show lldp info remote-device {{ access_port_id }}"
  register: acc_lldp
  failed_when: false
  changed_when: false

- name: "Déterminer si le port est une rocade"
  ansible.builtin.set_fact:
    acc_caps: "{{ acc_lldp.stdout | default('') | lower }}"
    acc_neighbor: >-
      {{ (acc_lldp.stdout | default('')
          | regex_search('(?i)SysName\s*:\s*(\S.*)', '\1')
          | default(['(inconnu)'], true) | first | trim) }}

- name: "INTERDIT — assigner une rocade en accès"
  ansible.builtin.fail:
    msg: >-
      ⛔ Le port {{ access_port_id }} de {{ inventory_hostname }} est une ROCADE
      (voisin : {{ acc_neighbor }}). Refus : le passer en accès couperait le
      lien inter-switch.
  when: >-
    ((access_port_id | string) in (uplink_ports | default([]) | map('string') | list))
    or ('bridge' in acc_caps and 'wlan' not in acc_caps
        and 'access point' not in acc_caps and 'telephone' not in acc_caps)

# ---- Application ----------------------------------------------------------
- name: "ProCurve — port {{ access_port_id }} en accès dans le VLAN {{ access_vlan_id }}"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - configure terminal
    - "vlan {{ access_vlan_id | int }} untagged {{ access_port_id }}"
    - end
  register: acc_apply
  when: not (access_dry_run | bool)

- name: "ProCurve — sauvegarde de la config (write memory)"
  ansible.netcommon.cli_command:
    command: write memory
  when:
    - access_save | bool
    - not (access_dry_run | bool)

# ---- Simulation -----------------------------------------------------------
- name: "ProCurve — SIMULATION : état actuel du port {{ access_port_id }}"
  ansible.netcommon.cli_command:
    command: "show vlans ports {{ access_port_id }} detail"
  register: acc_dry
  failed_when: false
  changed_when: false
  when: access_dry_run | bool

- name: "ProCurve — SIMULATION : résumé"
  ansible.builtin.debug:
    msg: >-
      [DRY-RUN] {{ inventory_hostname }} : le port {{ access_port_id }} serait
      placé en accès (untagged) dans le VLAN {{ access_vlan_id }}
      (voisin LLDP : {{ acc_neighbor }}). Rien n'a été écrit.
  when: access_dry_run | bool
