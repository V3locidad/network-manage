---
# Rôle firmware — met à jour l'OS d'un switch. Valide puis aiguille par vendor.
# ⚠️ OPÉRATION SENSIBLE (reboot). firmware_check=true par défaut.

- name: "Validation des paramètres firmware"
  ansible.builtin.assert:
    that:
      - firmware_image | default('') | length > 0
      - firmware_tftp_server | default('') | length > 0
    fail_msg: >-
      firmware_image (nom du .swi) et firmware_tftp_server (IP du TFTP)
      sont obligatoires.
    quiet: true

- name: "Implémentation disponible pour {{ switch_vendor }} ?"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ switch_vendor }}.yml"
  register: _vendor_impl
  delegate_to: localhost

- name: "Aiguillage vers l'implémentation {{ switch_vendor }}"
  ansible.builtin.include_tasks: "{{ switch_vendor }}.yml"
  when: _vendor_impl.stat.exists

- name: "Action non implémentée pour {{ switch_vendor }} — ignoré"
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} : pas d'implémentation « {{ switch_vendor }} »
      pour cette action — ignoré (sans erreur).
  when: not _vendor_impl.stat.exists
