---
# Mise à jour firmware Aruba 2930F / ArubaOS-Switch via TFTP, en SSH.
#
# ⚠️⚠️ PROVOQUE UN REBOOT (coupure ~2-3 min du switch). À RÔDER EN LAB.
#      firmware_check=true par défaut = simulation, ne touche à rien.
#      La flash primaire est conservée comme ROLLBACK.
#
# NB : les invites exactes (save/continue) peuvent varier selon le firmware ;
#      ajuste les 'prompt' ci-dessous après un premier test en lab.

# ---- Lecture de l'état actuel de la flash ---------------------------------
- name: "Lire l'état de la flash (versions)"
  ansible.netcommon.cli_command:
    command: show flash
  register: fw_flash
  changed_when: false

- name: "Extraire les versions primary / secondary"
  ansible.builtin.set_fact:
    fw_primary: >-
      {{ (fw_flash.stdout | regex_search('Primary Image\s*:\s*\d+\s+\S+\s+(\S+)', '\1')
          | default(['?'], true)) | first }}
    fw_secondary: >-
      {{ (fw_flash.stdout | regex_search('Secondary Image\s*:\s*\d+\s+\S+\s+(\S+)', '\1')
          | default(['?'], true)) | first }}

# ---- SIMULATION (dry-run) -------------------------------------------------
- name: "SIMULATION — plan de mise à jour (rien n'est écrit)"
  ansible.builtin.debug:
    msg: >-
      [DRY-RUN] {{ inventory_hostname }} — flash actuelle : primary={{ fw_primary }},
      secondary={{ fw_secondary }}. Plan : copier « {{ firmware_image }} » depuis
      tftp://{{ firmware_tftp_server }} en flash {{ firmware_partition }}, puis
      booter dessus (cible {{ firmware_target_version | default('non précisée') }}).
      ⚠️ REBOOT requis. Décoche la simulation pour appliquer.
  when: firmware_check | bool

# ---- APPLICATION RÉELLE ---------------------------------------------------
# Version attendue déduite du nom de fichier (WC_16_11_0030.swi -> WC.16.11.0030).
- name: "Version firmware attendue (depuis le nom de l'image)"
  ansible.builtin.set_fact:
    firmware_expected_version: "{{ firmware_image | regex_replace('\\.swi$', '') | regex_replace('_', '.') }}"
  when: not (firmware_check | bool)

- name: "Copier l'image en flash {{ firmware_partition }} (plusieurs minutes)"
  ansible.netcommon.cli_command:
    command: "copy tftp flash {{ firmware_tftp_server }} {{ firmware_image }} {{ firmware_partition }}"
    # AOS-Switch demande « The secondary image will be deleted. Continue (y/n)? »
    prompt:
      - "Continue"
    answer:
      - "y"
    check_all: true
  vars:
    ansible_command_timeout: 900
  register: fw_copy
  failed_when: false
  when: not (firmware_check | bool)

- name: "Sortie de la copie TFTP (diagnostic)"
  ansible.builtin.debug:
    msg: "{{ fw_copy.stdout | default('(pas de sortie)') }}"
  when: not (firmware_check | bool)

# ⚠️ SÉCURITÉ ANTI-DOWNGRADE : on relit la flash et on VÉRIFIE que la partition
# contient bien la version attendue AVANT de basculer le boot. Si la copie a
# échoué (Transport error, image absente…), on s'arrête ici — le boot n'est PAS
# touché, donc pas de redémarrage sur une image vieille/absente.
- name: "Relire la flash après copie"
  ansible.netcommon.cli_command:
    command: show flash
  register: fw_postcopy
  changed_when: false
  when: not (firmware_check | bool)

- name: "Version réellement écrite dans la flash {{ firmware_partition }}"
  ansible.builtin.set_fact:
    fw_copied: >-
      {{ (fw_postcopy.stdout | regex_search(firmware_partition | capitalize ~ ' Image\s*:\s*\d+\s+\S+\s+(\S+)', '\1')
          | default(['?'], true)) | first }}
  when: not (firmware_check | bool)

- name: "Vérifier que l'image a bien été écrite (sinon ON N'ÉCRIT PAS le boot)"
  ansible.builtin.assert:
    that:
      - fw_copied == firmware_expected_version
    fail_msg: >-
      ❌ La copie de l'image a ÉCHOUÉ : la flash {{ firmware_partition }} contient
      « {{ fw_copied }} », pas « {{ firmware_expected_version }} ». Le boot n'est
      PAS basculé (aucun downgrade). Sortie de la copie : « {{ fw_copy.stdout | default('') }} ».
      Vérifie que le switch atteint {{ firmware_tftp_server }} (UDP/69) et que
      « {{ firmware_image }} » est bien servi à la racine TFTP.
    success_msg: "✅ Image {{ firmware_expected_version }} écrite en flash {{ firmware_partition }} — bascule du boot autorisée."
  when: not (firmware_check | bool)

- name: "Basculer le boot sur la flash {{ firmware_partition }} + reboot"
  ansible.netcommon.cli_command:
    command: "boot system flash {{ firmware_partition }}"
    prompt:
      - "[yY]/[nN]"
    answer:
      - "y"
    check_all: true
  vars:
    ansible_command_timeout: 120
  failed_when: false      # la session SSH tombe au reboot : c'est normal
  when: not (firmware_check | bool)

- name: "Attendre le retour du switch (SSH)"
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    delay: 150
    timeout: 900
  delegate_to: localhost
  when: not (firmware_check | bool)

- name: "Relire la flash après reboot"
  ansible.netcommon.cli_command:
    command: show flash
  register: fw_after
  changed_when: false
  when: not (firmware_check | bool)

- name: "Résultat de la mise à jour"
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} redémarré. Cible : {{ firmware_target_version | default('?') }}.
      Flash après MAJ :
      {{ fw_after.stdout | default('(non lu)') }}
  when: not (firmware_check | bool)
