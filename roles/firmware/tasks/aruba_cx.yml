---
# Mise à jour firmware Aruba CX — squelette à compléter.
- name: "Aruba CX — upload + boot de la nouvelle image"
  arubanetworks.aoscx.aoscx_upload_firmware:
    partition_name: "{{ firmware_partition | default('primary') }}"
    remote_firmware_file_path: "{{ firmware_source_url }}"
    vrf: "{{ firmware_vrf | default('mgmt') }}"
  when: not (firmware_check | bool)

- name: "Aruba CX — boot sur la partition mise à jour"
  arubanetworks.aoscx.aoscx_boot_firmware:
    partition_name: "{{ firmware_partition | default('primary') }}"
  when: not (firmware_check | bool)
  # ⚠️ Provoque un reboot. Fenêtre de maintenance requise.
