---
# Implémentation VLAN pour Aruba CX en SSH/CLI (cli_command).
- name: "Aruba CX — créer/mettre à jour le VLAN {{ vlan_id }}"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - configure terminal
    - "vlan {{ vlan_id | int }}"
    - "name {{ vlan_name }}"
    - exit
    - end
  when:
    - vlan_state == 'present'
    - not (vlan_dry_run | bool)

- name: "Aruba CX — supprimer le VLAN {{ vlan_id }}"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - configure terminal
    - "no vlan {{ vlan_id | int }}"
    - end
  when:
    - vlan_state == 'absent'
    - not (vlan_dry_run | bool)

- name: "Aruba CX — sauvegarde (write memory)"
  ansible.netcommon.cli_command:
    command: write memory
  when:
    - vlan_save_config | bool
    - not (vlan_dry_run | bool)

- name: "Aruba CX — SIMULATION"
  ansible.builtin.debug:
    msg: >-
      [DRY-RUN] {{ inventory_hostname }} (Aruba CX) : VLAN {{ vlan_id }}
      ({{ vlan_name }}) serait « {{ vlan_state }} ». Rien n'a été écrit.
  when: vlan_dry_run | bool
