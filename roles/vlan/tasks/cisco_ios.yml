---
# Implémentation VLAN pour Cisco IOS / IOS-XE en CLI (cli_command).
# Volontairement en cli_command (et non le module ios_vlans, qui suppose une
# syntaxe IOS-XE « show run | section vlan configuration » absente de l'IOS
# classique des 2960). Nécessite le mode privilégié -> cisco_become=true.

- name: "Cisco IOS — créer/mettre à jour le VLAN {{ vlan_id }}"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - configure terminal
    - "vlan {{ vlan_id | int }}"
    - "name {{ vlan_name }}"
    - end
  when:
    - vlan_state == 'present'
    - not (vlan_dry_run | bool)

- name: "Cisco IOS — supprimer le VLAN {{ vlan_id }}"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - configure terminal
    - "no vlan {{ vlan_id | int }}"
    - end
  when:
    - vlan_state == 'absent'
    - not (vlan_dry_run | bool)

- name: "Cisco IOS — sauvegarde (write memory)"
  ansible.netcommon.cli_command:
    command: write memory
  when:
    - vlan_save_config | bool
    - not (vlan_dry_run | bool)

- name: "Cisco IOS — SIMULATION"
  ansible.builtin.debug:
    msg: >-
      [DRY-RUN] {{ inventory_hostname }} (Cisco IOS) : VLAN {{ vlan_id }}
      ({{ vlan_name }}) serait « {{ vlan_state }} ». Rien n'a été écrit.
  when: vlan_dry_run | bool
