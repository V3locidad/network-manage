---
# VLAN pour Aruba 2930F / ArubaOS-Switch en SSH via cli_command.
# À la création, le VLAN est AUSSI taggé sur les rocades (liens inter-switch)
# pour qu'il se propage à tout le réseau.

# ---- Détection des rocades (pour propager le VLAN partout) ----------------
# Méthode fiable : on identifie les ports dont le voisin LLDP annonce la
# capacité « Bridge » (= un switch), comme le rôle port. Indépendant des noms
# (le tableau résumé tronque souvent le SysName).
- name: "Lister les ports ayant un voisin LLDP"
  ansible.netcommon.cli_command:
    command: show lldp info remote-device
  register: vlan_lldp
  changed_when: false
  when: vlan_state == 'present'

- name: "Extraire les ports locaux avec voisin"
  ansible.builtin.set_fact:
    vlan_lldp_ports: >-
      {{ vlan_lldp.stdout | default('')
         | regex_findall('(?m)^\s*(\d[0-9A-Za-z/]*)\s*\|') }}
  when: vlan_state == 'present'

- name: "Lire le détail LLDP de chaque port (capacités du voisin)"
  ansible.netcommon.cli_command:
    command: "show lldp info remote-device {{ item }}"
  loop: "{{ vlan_lldp_ports | default([]) }}"
  register: vlan_lldp_details
  changed_when: false
  failed_when: false
  when:
    - vlan_state == 'present'
    - (vlan_lldp_ports | default([])) | length > 0

- name: "Rocades = voisin « Bridge » (hors borne Wi-Fi / téléphone)"
  ansible.builtin.set_fact:
    vlan_rocade_ports: "{{ (vlan_rocade_ports | default([])) + [item.item] }}"
  loop: "{{ vlan_lldp_details.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('') }}"
  when:
    - vlan_state == 'present'
    - "'bridge' in (item.stdout | default('') | lower)"
    - "'wlan' not in (item.stdout | default('') | lower)"
    - "'access point' not in (item.stdout | default('') | lower)"
    - "'telephone' not in (item.stdout | default('') | lower)"

- name: "Liste finale des ports à tagger (rocades LLDP + uplink_ports manuels)"
  ansible.builtin.set_fact:
    vlan_tag_ports: >-
      {{ ((vlan_rocade_ports | default([])) + (uplink_ports | default([])))
         | map('string') | unique | join(',') }}
  when: vlan_state == 'present'

# ---- Création / mise à jour + tag sur les rocades -------------------------
- name: "ProCurve — créer le VLAN {{ vlan_id }} ({{ vlan_name }}) + tag rocades"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop: >-
    {{ ['configure terminal',
        'vlan ' ~ (vlan_id | int) ~ ' name "' ~ vlan_name ~ '"']
       + (['vlan ' ~ (vlan_id | int) ~ ' tagged ' ~ vlan_tag_ports]
          if (vlan_tag_ports | default('')) | length > 0 else [])
       + ['end'] }}
  register: procurve_present
  when:
    - vlan_state == 'present'
    - not (vlan_dry_run | bool)

# ---- Suppression ----------------------------------------------------------
- name: "ProCurve — supprimer le VLAN {{ vlan_id }}"
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop:
    - configure terminal
    - "no vlan {{ vlan_id | int }}"
    - end
  register: procurve_absent
  when:
    - vlan_state == 'absent'
    - not (vlan_dry_run | bool)

# ---- Sauvegarde (write memory) --------------------------------------------
- name: "ProCurve — sauvegarde de la config (write memory)"
  ansible.netcommon.cli_command:
    command: write memory
  when:
    - vlan_save_config | bool
    - not (vlan_dry_run | bool)

# ---- Simulation -----------------------------------------------------------
- name: "ProCurve — SIMULATION : lire l'état du VLAN {{ vlan_id }}"
  ansible.netcommon.cli_command:
    command: "show vlans {{ vlan_id | int }}"
  register: procurve_dry
  failed_when: false
  changed_when: false
  when: vlan_dry_run | bool

- name: "ProCurve — SIMULATION : résumé"
  ansible.builtin.debug:
    msg: >-
      [DRY-RUN] {{ inventory_hostname }} : VLAN {{ vlan_id }} ({{ vlan_name }})
      serait « {{ vlan_state }} ».
      {{ ('Taggé sur les rocades : ' ~ vlan_tag_ports)
         if (vlan_state == 'present' and (vlan_tag_ports | default('')) | length > 0)
         else ('Aucune rocade détectée à tagger.' if vlan_state == 'present' else '') }}
      Rien n'a été écrit.
  when: vlan_dry_run | bool
